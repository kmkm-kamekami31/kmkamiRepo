<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kmkamiRepo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#0d1117;
    color:white;
}

header{
    background:#161b22;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    border-bottom:1px solid #30363d;
}

#profile{
    text-align:center;
    padding:40px;
}

#profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #58a6ff;
}

#name{
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
}

#bio{
    color:#9ca3af;
    margin-top:8px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:20px;
    flex-wrap:wrap;
}

.stat{
    background:#161b22;
    padding:15px 25px;
    border-radius:10px;
}

h2{
    text-align:center;
    margin:30px;
}

.repo{
    background:#161b22;
    width:min(900px,90%);
    margin:20px auto;
    border-radius:12px;
    padding:20px;
}

.repo h3{
    color:#58a6ff;
}

.repo p{
    margin:10px 0;
}

.buttons{
    margin-top:15px;
}

button{
    background:#238636;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    margin-right:10px;
}

button:hover{
    opacity:.9;
}

footer{
    margin:50px;
    text-align:center;
    color:gray;
}
</style>

</head>
<body>

<header>
kmkamiRepo
</header>

<section id="profile">

<img id="avatar">

<div id="name">読み込み中...</div>

<div id="bio"></div>

<div class="stats">

<div class="stat">
📦<br>
<span id="repos">0</span><br>
Repositories
</div>

<div class="stat">
👥<br>
<span id="followers">0</span><br>
Followers
</div>

<div class="stat">
⭐<br>
<span id="following">0</span><br>
Following
</div>

</div>

</section>

<h2>📦 Repositories</h2>

<div id="repoList"></div>

<footer>

kmkamiRepo © 2026

</footer>

<script>

const USER="kmkm-kamekami31";

//プロフィール取得
fetch(`https://api.github.com/users/${USER}`)
.then(r=>r.json())
.then(data=>{

document.getElementById("avatar").src=data.avatar_url;
document.getElementById("name").textContent=data.name || data.login;
document.getElementById("bio").textContent=data.bio || "";
document.getElementById("repos").textContent=data.public_repos;
document.getElementById("followers").textContent=data.followers;
document.getElementById("following").textContent=data.following;

});

//リポジトリ取得
fetch(`https://api.github.com/users/${USER}/repos?sort=updated`)
.then(r=>r.json())
.then(repos=>{

const list=document.getElementById("repoList");

repos.forEach(repo=>{

const div=document.createElement("div");

div.className="repo";

div.innerHTML=`
<h3>${repo.name}</h3>

<p>${repo.description || "説明なし"}</p>

<p>💻 ${repo.language || "-"}</p>

<div class="buttons">

<button onclick="window.open('${repo.html_url}')">
GitHub
</button>

</div>
`;

list.appendChild(div);

});

});

</script>

</body>
</html>
