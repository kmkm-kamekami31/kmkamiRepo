<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="version" content="1.0">

<title>kmkamiRepo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#161b22;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
border-bottom:1px solid #30363d;
}

#profile{
text-align:center;
padding:40px;
}

#profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #58a6ff;
}

#name{
margin-top:15px;
font-size:28px;
font-weight:bold;
}

#bio{
margin-top:10px;
color:#9ca3af;
}

.stats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:20px;
}

.stat{
background:#161b22;
padding:15px 25px;
border-radius:10px;
}

.repo{
width:90%;
max-width:900px;
margin:20px auto;
background:#161b22;
padding:20px;
border-radius:12px;
}

.repo h3{
color:#58a6ff;
margin-bottom:10px;
}

.repo p{
margin:8px 0;
}

button{
background:#238636;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

footer{
text-align:center;
color:gray;
margin:40px;
}

#error{
color:red;
text-align:center;
margin-top:20px;
}
</style>

</head>
<body>

<header>
kmkamiRepo
</header>

<section id="profile">

<img id="avatar" src="">

<div id="name">読み込み中...</div>

<div id="bio"></div>

<div class="stats">

<div class="stat">
📦<br>
<span id="repos">0</span><br>
Repositories
</div>

<div class="stat">
👥<br>
<span id="followers">0</span><br>
Followers
</div>

<div class="stat">
⭐<br>
<span id="following">0</span><br>
Following
</div>

</div>

</section>

<h2 style="text-align:center;">📦 Repositories</h2>

<div id="repoList"></div>

<div id="error"></div>

<footer>
kmkamiRepo ©2026
</footer>

<script>

var USER="kmkm-kamekami31";

function showError(msg){
document.getElementById("error").innerHTML=msg;
}

fetch("https://api.github.com/users/"+USER)
.then(function(res){
return res.json();
})
.then(function(data){

document.getElementById("avatar").src=data.avatar_url;
document.getElementById("name").innerHTML=data.name||data.login;
document.getElementById("bio").innerHTML=data.bio||"";
document.getElementById("repos").innerHTML=data.public_repos;
document.getElementById("followers").innerHTML=data.followers;
document.getElementById("following").innerHTML=data.following;

})
.catch(function(err){
showError("プロフィール取得失敗<br>"+err);
});

fetch("https://api.github.com/users/"+USER+"/repos?sort=updated")
.then(function(res){
return res.json();
})
.then(function(repos){

var list=document.getElementById("repoList");

for(var i=0;i<repos.length;i++){

var repo=repos[i];

var div=document.createElement("div");

div.className="repo";

div.innerHTML=
"<h3>"+repo.name+"</h3>"+
"<p>"+(repo.description||"説明なし")+"</p>"+
"<p>💻 "+(repo.language||"-")+"</p>"+
"<button onclick=\"window.open('"+repo.html_url+"')\">GitHub</button>";

list.appendChild(div);

}

})
.catch(function(err){
showError("リポジトリ取得失敗<br>"+err);
});

</script>

</body>
</html>
